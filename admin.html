<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — ЦПЦ Категорија Ц</title>
<link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="/admin.css">
</head>
<body>

<!-- LOGIN -->
<section id="admin-login" class="screen">
  <div class="login-container">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5-1.1-2.5-2.5S10.6 7 12 7zm0 12c-2.03 0-3.8-1.11-4.75-2.75.03-1.65 3.32-2.5 4.75-2.5 1.43 0 4.72.85 4.75 2.5C15.8 17.89 14.03 19 12 19z"/></svg>
      </div>
      <div>
        <h1 class="brand-title">АДМИН ПАНЕЛ</h1>
        <p class="brand-subtitle">ЦПЦ Категорија Ц</p>
      </div>
    </div>

    <form id="admin-login-form" class="login-form">
      <h2>Пријава администратора</h2>
      <label class="field">
        <span>Админ лозинка</span>
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary btn-block">Пријави се</button>
      <p id="admin-error" class="error-msg" hidden></p>
    </form>
  </div>
</section>

<!-- PANEL -->
<section id="admin-panel" class="screen" hidden>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        <span class="app-brand-mark">ADMIN</span>
        <span class="app-brand-text">ЦПЦ Ц</span>
      </div>
      <div class="app-user">
        <a href="/" class="btn btn-ghost btn-sm">Преглед курса</a>
        <button id="admin-logout" class="btn btn-ghost btn-sm">Одјава</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    
    <!-- Overview stats -->
    <div class="admin-overview" id="admin-overview"></div>

    <!-- Signup requests -->
    <details class="admin-section" id="requests-section" open>
      <summary>
        <h3>📩 Захтеви за одобрење (<span id="requests-count">0</span>)</h3>
      </summary>
      <div class="requests-list" id="requests-list">
        <p class="loading">Учитавам...</p>
      </div>
    </details>

    <!-- Add user -->
    <details class="admin-section">
      <summary>
        <h3>➕ Додај полазника ручно</h3>
      </summary>
      <form id="add-user-form" class="add-user-form">
        <div class="form-grid">
          <label class="field">
            <span>Име и презиме *</span>
            <input type="text" name="name" required>
          </label>
          <label class="field">
            <span>Имејл *</span>
            <input type="email" name="email" required>
          </label>
          <label class="field">
            <span>Телефон *</span>
            <input type="tel" name="phone" required>
          </label>
          <label class="field">
            <span>Лозинка * (мин. 6 знакова)</span>
            <input type="text" name="password" required minlength="6">
          </label>
          <label class="field">
            <span>Истиче (опционо)</span>
            <input type="date" name="expires_at">
          </label>
          <div></div>
        </div>
        <button type="submit" class="btn btn-primary">Додај полазника</button>
        <p id="add-error" class="error-msg" hidden></p>
        <p id="add-success" class="success-msg" hidden></p>
      </form>
    </details>

    <!-- Users list -->
    <details class="admin-section" open>
      <summary>
        <h3>👥 Полазници (<span id="users-count">0</span>)</h3>
        <a href="/api/admin/users.csv" class="btn btn-ghost btn-sm">↓ CSV</a>
      </summary>
      <div class="users-list" id="users-list">
        <p class="loading">Учитавам...</p>
      </div>
    </details>

    <!-- Hardest questions -->
    <details class="admin-section">
      <summary>
        <h3>🎯 Најтежа питања (глобално)</h3>
      </summary>
      <div class="hardest-list" id="hardest-list">
        <p class="loading">Учитавам...</p>
      </div>
    </details>

  </main>
</section>

<div id="toast" class="toast" hidden></div>

<!-- Modal for editing -->
<div id="modal" class="modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="/admin.js"></script>
</body>
</html>
